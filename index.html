<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네온 런너 플러스 (Ultimate Features)</title>
    <style>
        :root {
            --bg-color: #050510;
            --player-color: #00f2fe;
            --obstacle-color: #ff0055;
            --item-color: #ffd700;
            --coin-color: #00ff66;
            --magnet-color: #ff00ff;
            --shield-color: #00ffff;
            --ground-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 400px; /* 초기 높이, JS로 확장됨 */
            max-height: 90vh; /* 화면 밖으로 넘어가지 않게 제한 */
            background: linear-gradient(to bottom, #050515 0%, #0a0a20 100%);
            border-bottom: 4px solid var(--ground-color);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transition: background 2s ease; 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        #shield-status {
            font-size: 16px;
            font-weight: bold;
            color: var(--shield-color);
            text-shadow: 0 0 10px var(--shield-color);
            display: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
            color: var(--player-color);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--player-color);
        }

        .menu-section {
            margin: 15px 0;
            text-align: center;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }

        .options-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 500px;
        }

        .opt-btn {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .opt-btn.active {
            border-color: var(--player-color);
            background: rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 10px var(--player-color);
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-dot.active {
            border-color: #fff;
            transform: scale(1.25);
            box-shadow: 0 0 15px currentColor;
        }

        .custom-color-wrapper {
            position: relative;
            overflow: hidden;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }

        .custom-color-wrapper::after {
            content: '+';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #custom-color-picker {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            opacity: 0;
        }

        .btn-start {
            background: var(--player-color);
            color: #000;
            border: none;
            padding: 12px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--player-color);
        }

        #speed-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            color: #ff0055;
            font-size: 48px;
            display: none;
            text-shadow: 0 0 30px #ff0055;
            z-index: 5;
            pointer-events: none;
            font-style: italic;
        }

        @keyframes speedPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .animate-speed {
            animation: speedPop 1.2s forwards;
        }

        .status-timers {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            z-index: 5;
        }

        .timer-badge {
            font-weight: bold;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
        }

        #invincible-timer {
            color: var(--item-color);
            text-shadow: 0 0 15px var(--item-color);
            border: 2px solid var(--item-color);
        }

        #magnet-timer {
            color: var(--magnet-color);
            text-shadow: 0 0 15px var(--magnet-color);
            border: 2px solid var(--magnet-color);
        }

        #jump-alert, #rest-alert {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            display: none;
            z-index: 5;
            font-style: italic;
            pointer-events: none;
        }

        #jump-alert { top: 30%; color: #00f2fe; font-size: 40px; text-shadow: 0 0 20px #00f2fe; }
        #rest-alert { top: 40%; color: #a2ff00; font-size: 36px; text-shadow: 0 0 20px #a2ff00; }
        
        #rest-subtitle {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #fff;
            text-shadow: 0 0 15px #00f2fe;
            display: none;
            z-index: 5;
            font-weight: 900;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div class="stat-group">
                <div id="scoreLabel" class="stat">SCORE: 0</div>
                <div id="shield-status">🛡️ 실드 활성화됨</div>
            </div>
            <div id="highScoreLabel" class="stat">BEST: 0</div>
        </div>
        
        <div id="speed-alert">SPEED UP!!</div>
        <div id="jump-alert">3단 점프 해제!</div>
        <div id="rest-alert">☕ 휴식 구간 ☕</div>
        <div id="rest-subtitle">잠시 쉬어가세요...</div>

        <div class="status-timers">
            <div id="invincible-timer" class="timer-badge">무적 상태 (3.0s)</div>
            <div id="magnet-timer" class="timer-badge">자석 효과 (5.0s)</div>
        </div>

        <div id="overlay">
            <h1 id="title">NEON RUNNER</h1>
            
            <div class="menu-section">
                <span class="label">난이도 선택</span>
                <div class="options-group" id="difficulty-group">
                    <button class="opt-btn" onclick="setDiff('easy', this)">EASY</button>
                    <button class="opt-btn active" onclick="setDiff('normal', this)">NORMAL</button>
                    <button class="opt-btn" onclick="setDiff('hard', this)">HARD</button>
                </div>
            </div>

            <div class="menu-section">
                <span class="label">캐릭터 색상 선택</span>
                <div class="options-group" id="color-group">
                    <div class="color-dot active" style="background: #00f2fe; color: #00f2fe;" onclick="setPlayerColor('#00f2fe', this)"></div>
                    <div class="color-dot" style="background: #a2ff00; color: #a2ff00;" onclick="setPlayerColor('#a2ff00', this)"></div>
                    <div class="color-dot" style="background: #ff00ff; color: #ff00ff;" onclick="setPlayerColor('#ff00ff', this)"></div>
                    <div class="color-dot" style="background: #ff0055; color: #ff0055;" onclick="setPlayerColor('#ff0055', this)"></div>
                    <div class="color-dot" style="background: #ff9d00; color: #ff9d00;" onclick="setPlayerColor('#ff9d00', this)"></div>
                    <div class="color-dot" style="background: #ffff00; color: #ffff00;" onclick="setPlayerColor('#ffff00', this)"></div>
                    <div class="color-dot" style="background: #00ff00; color: #00ff00;" onclick="setPlayerColor('#00ff00', this)"></div>
                    <div class="color-dot" style="background: #00ffcc; color: #00ffcc;" onclick="setPlayerColor('#00ffcc', this)"></div>
                    <div class="color-dot" style="background: #0066ff; color: #0066ff;" onclick="setPlayerColor('#0066ff', this)"></div>
                    <div class="color-dot" style="background: #7000ff; color: #7000ff;" onclick="setPlayerColor('#7000ff', this)"></div>
                    <div class="color-dot" style="background: #ff00aa; color: #ff00aa;" onclick="setPlayerColor('#ff00aa', this)"></div>
                    <div class="color-dot" style="background: #ffffff; color: #ffffff;" onclick="setPlayerColor('#ffffff', this)"></div>
                    <div class="color-dot custom-color-wrapper" id="custom-color-wrapper" title="나만의 색상 만들기">
                        <input type="color" id="custom-color-picker" value="#ffffff">
                    </div>
                </div>
            </div>

            <button class="btn-start" onclick="startGame()">START (Space)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const scoreLabel = document.getElementById('scoreLabel');
        const highScoreLabel = document.getElementById('highScoreLabel');
        const overlay = document.getElementById('overlay');
        const invincibleUI = document.getElementById('invincible-timer');
        const magnetUI = document.getElementById('magnet-timer');
        const shieldUI = document.getElementById('shield-status');
        const speedAlertUI = document.getElementById('speed-alert');
        const restSubtitle = document.getElementById('rest-subtitle');

        let gameActive = false;
        let score = 0;
        let highScore = 0;
        let gameSpeed = 5;
        let initialSpeed = 5;
        let speedIncrement = 0.5;
        let animationId;
        let playerColor = '#00f2fe';
        let shakeTime = 0; 
        
        // 카메라 (화면 확장) 설정
        let GROUND_Y = 350;
        let currentContainerHeight = 400;
        let targetContainerHeight = 400;

        const speedUpMilestones = [100, 500, 1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000];
        let nextMilestoneIndex = 0;
        let unlocked3Jump = false;
        let unlocked4Jump = false;
        let isResting = false;
        let restTimer = 0;
        let nextRestScore = 1500;

        function resize() {
            canvas.width = gameContainer.clientWidth;
            canvas.height = currentContainerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function setDiff(diff, btn) {
            document.querySelectorAll('#difficulty-group .opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(diff === 'easy') { initialSpeed = 4; speedIncrement = 0.3; }
            else if(diff === 'normal') { initialSpeed = 5; speedIncrement = 0.6; }
            else { initialSpeed = 7; speedIncrement = 1.0; }
        }

        function setPlayerColor(color, dot) {
            document.querySelectorAll('#color-group .color-dot').forEach(d => {
                d.classList.remove('active');
                if (d.id === 'custom-color-wrapper') d.style.color = 'transparent';
            });
            dot.classList.add('active');
            if (dot.id === 'custom-color-wrapper') dot.style.color = color;

            playerColor = color;
            document.documentElement.style.setProperty('--player-color', color);
        }

        const customColorPicker = document.getElementById('custom-color-picker');
        const customColorWrapper = document.getElementById('custom-color-wrapper');
        customColorPicker.addEventListener('input', (e) => {
            setPlayerColor(e.target.value, customColorWrapper);
        });

        function updateBackgroundColor() {
            const hue = (230 + nextMilestoneIndex * 30) % 360; 
            const topColor = `hsl(${hue}, 40%, 6%)`;
            const bottomColor = `hsl(${hue}, 50%, 12%)`;
            gameContainer.style.background = `linear-gradient(to bottom, ${topColor} 0%, ${bottomColor} 100%)`;
        }

        // ================= 클래스 정의 =================

        class BackgroundBuilding {
            constructor() {
                this.width = 40 + Math.random() * 60;
                this.height = 50 + Math.random() * 150;
                this.x = canvas.width + Math.random() * 100;
                this.y = GROUND_Y - this.height;
                this.speedMult = 0.3 + Math.random() * 0.2; 
                this.color = `hsla(${200 + Math.random()*60}, 100%, 60%, 0.3)`;
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = this.color.replace('0.3)', '0.1)');
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.restore();
            }
            update() {
                this.x -= gameSpeed * this.speedMult;
            }
        }

        class Player {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = 80;
                this.y = GROUND_Y - this.height;
                this.vy = 0;
                this.gravity = 0.8;
                this.jumpStrength = -14;
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.rotation = 0; 
                this.trail = []; 

                this.isInvincible = false;
                this.invincibleTimer = 0;
                this.isMagnetic = false;
                this.magnetTimer = 0;
                this.hasShield = false;
                this.shieldInvincible = 0; 
            }

            draw() {
                this.trail.forEach((t, i) => {
                    ctx.save();
                    ctx.globalAlpha = (i / this.trail.length) * 0.35;
                    ctx.strokeStyle = this.isInvincible ? '#ffd700' : playerColor;
                    ctx.lineWidth = 2;
                    ctx.translate(t.x + this.width / 2, t.y + this.height / 2);
                    ctx.rotate(t.rotation);
                    ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.restore();
                });

                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation); 
                
                let currentColor = playerColor;
                if (this.isInvincible || this.shieldInvincible > 0) currentColor = '#ffd700';
                
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = 3;
                ctx.shadowBlur = (this.isInvincible || this.hasShield) ? 25 : 15;
                ctx.shadowColor = currentColor;
                
                ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.fillStyle = (this.isInvincible || this.shieldInvincible > 0) ? 'rgba(255, 215, 0, 0.3)' : (playerColor + '33');
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                if (this.hasShield) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width * 0.8, 0, Math.PI * 2);
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 5]); 
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                if (this.isMagnetic) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width * 1.2, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.restore();
            }

            update() {
                this.trail.push({x: this.x, y: this.y, rotation: this.rotation});
                if (this.trail.length > 6) this.trail.shift();

                this.y += this.vy;
                this.vy += this.gravity;

                if (this.y >= GROUND_Y - this.height) {
                    if (this.vy > 5) createDust(this.x + this.width/2, GROUND_Y, playerColor);
                    this.y = GROUND_Y - this.height;
                    this.vy = 0;
                    this.jumpCount = 0;
                    this.rotation = 0; 
                } else {
                    this.rotation += 0.1 + (gameSpeed * 0.01);
                    if (Math.random() > 0.6) {
                        particles.push(new Particle(this.x, this.y + this.height/2, this.isInvincible ? '#ffd700' : playerColor, 0.5));
                    }
                }

                if (this.isInvincible) {
                    this.invincibleTimer--;
                    const remainingSec = (this.invincibleTimer / 60).toFixed(1);
                    invincibleUI.innerText = `무적 상태 (${remainingSec}s)`;
                    if (this.invincibleTimer <= 0) {
                        this.isInvincible = false;
                        invincibleUI.style.display = 'none';
                    }
                }

                if (this.isMagnetic) {
                    this.magnetTimer--;
                    const remainingSec = (this.magnetTimer / 60).toFixed(1);
                    magnetUI.innerText = `자석 효과 (${remainingSec}s)`;
                    if (this.magnetTimer <= 0) {
                        this.isMagnetic = false;
                        magnetUI.style.display = 'none';
                    }
                }

                if (this.shieldInvincible > 0) {
                    this.shieldInvincible--;
                }
            }

            jump() {
                if (this.jumpCount < this.maxJumps) {
                    this.vy = this.jumpStrength;
                    this.jumpCount++;
                    createDust(this.x + this.width/2, this.y + this.height, this.isInvincible ? '#ffd700' : playerColor);
                }
            }

            makeInvincible(duration) {
                this.isInvincible = true;
                this.invincibleTimer = duration;
                invincibleUI.style.display = 'block';
            }

            makeMagnetic(duration) {
                this.isMagnetic = true;
                this.magnetTimer = duration;
                magnetUI.style.display = 'block';
            }

            equipShield() {
                this.hasShield = true;
                shieldUI.style.display = 'block';
            }
        }

        class Obstacle {
            constructor(type) {
                this.type = type;
                this.x = canvas.width + 100;
                this.moveY = false;
                this.moveZigzag = false;
                this.moveDiag = false;
                this.speedOffset = 0;
                
                switch(type) {
                    case 0: this.width = 30 + Math.random() * 20; this.height = 40 + Math.random() * 30; this.y = GROUND_Y - this.height; this.color = '#ff0055'; break;
                    case 1: this.width = 40 + Math.random() * 20; this.height = 30; this.y = GROUND_Y - 110 - Math.random() * 30; this.color = '#00f2fe'; break;
                    case 2: this.width = 25; this.height = 80 + Math.random() * 40; this.y = GROUND_Y - this.height; this.color = '#b400ff'; break;
                    case 3: this.width = 45; this.height = 20; this.y = GROUND_Y - 80 - Math.random() * 60; this.color = '#ff9d00'; this.speedOffset = 2 + Math.random() * 3; break;
                    case 4: this.width = 120 + Math.random() * 80; this.height = 15; this.y = GROUND_Y - this.height; this.color = '#a2ff00'; break;
                    case 5: this.width = 40; this.height = 40; this.baseY = GROUND_Y - 100; this.y = this.baseY; this.color = '#ffff00'; this.moveY = true; this.angle = 0; break;
                    case 6: this.width = 40; this.height = GROUND_Y; this.y = 0; this.color = '#00ffcc'; this.gapSize = 110; this.gapY = GROUND_Y - 180 - Math.random() * 50; break;
                    case 7: this.width = 40; this.height = 200; this.y = GROUND_Y - this.height; this.color = '#ff00aa'; break;
                    case 8: this.width = 35; this.height = 35; this.baseY = GROUND_Y - 120; this.y = this.baseY; this.color = '#0055ff'; this.moveZigzag = true; this.angle = 0; this.speedOffset = 1.5; break;
                    case 9: this.width = 150; this.height = 30; this.y = GROUND_Y - this.height; this.color = '#ff3300'; this.isTripleSpike = true; break;
                    case 10: this.width = 45; this.height = 45; this.y = 50; this.color = '#ff00ff'; this.moveDiag = true; break;
                    case 11: this.width = 70; this.height = 70; this.y = GROUND_Y - this.height; this.color = '#aaff00'; this.isWheel = true; this.rollAngle = 0; break;
                    case 12: this.width = 20; this.height = 250; this.y = GROUND_Y - this.height; this.color = '#ffffff'; this.speedOffset = 3; break;
                }
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                
                if (this.type === 0) {
                    ctx.moveTo(this.x, this.y + this.height); ctx.lineTo(this.x + this.width / 2, this.y); ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.closePath(); ctx.stroke(); ctx.fillStyle = this.color + '33'; ctx.fill();
                } else if (this.type === 6) {
                    ctx.strokeRect(this.x, 0, this.width, this.gapY); ctx.fillStyle = this.color + '33'; ctx.fillRect(this.x, 0, this.width, this.gapY);
                    let bottomY = this.gapY + this.gapSize;
                    ctx.strokeRect(this.x, bottomY, this.width, GROUND_Y - bottomY); ctx.fillRect(this.x, bottomY, this.width, GROUND_Y - bottomY);
                } else if (this.isTripleSpike) {
                    for(let i=0; i<3; i++) {
                        let sx = this.x + i * 50;
                        ctx.moveTo(sx, this.y + this.height); ctx.lineTo(sx + 25, this.y); ctx.lineTo(sx + 50, this.y + this.height);
                    }
                    ctx.stroke(); ctx.fillStyle = this.color + '33'; ctx.fill();
                } else if (this.isWheel) {
                    ctx.translate(this.x + this.width/2, this.y + this.height/2); ctx.rotate(this.rollAngle);
                    ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height); ctx.fillStyle = this.color + '33'; ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                    ctx.beginPath(); ctx.moveTo(-this.width/2, -this.height/2); ctx.lineTo(this.width/2, this.height/2); ctx.moveTo(this.width/2, -this.height/2); ctx.lineTo(-this.width/2, this.height/2); ctx.stroke();
                } else {
                    ctx.strokeRect(this.x, this.y, this.width, this.height); ctx.fillStyle = this.color + '33'; ctx.fillRect(this.x, this.y, this.width, this.height);
                    if (this.type === 3 || this.type === 8) { ctx.fillStyle = '#fff'; ctx.fillRect(this.x + 10, this.y + 5, this.width - 20, 10); }
                }
                ctx.restore();
            }
            update() { 
                let spd = gameSpeed + this.speedOffset;
                this.x -= spd; 
                if (this.moveY) { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 50; }
                if (this.moveZigzag) { this.angle += 0.1; this.y = this.baseY + Math.sin(this.angle) * 80; }
                if (this.moveDiag) { this.y += spd * 0.5; if (this.y + this.height > GROUND_Y) this.y = GROUND_Y - this.height; }
                if (this.isWheel) { this.rollAngle -= 0.1; }
            }
            
            checkCollision(p) {
                let shrink = 5; 
                if (this.type === 6) {
                    let hitTop = (p.x < this.x + this.width - shrink && p.x + p.width > this.x + shrink && p.y < this.gapY - shrink && p.y + p.height > shrink);
                    let hitBot = (p.x < this.x + this.width - shrink && p.x + p.width > this.x + shrink && p.y < GROUND_Y - shrink && p.y + p.height > this.gapY + this.gapSize + shrink);
                    return hitTop || hitBot;
                } else {
                    return (p.x < this.x + this.width - shrink && p.x + p.width > this.x + shrink && p.y < this.y + this.height - shrink && p.y + p.height > this.y + shrink);
                }
            }
        }

        class Item {
            constructor(type) {
                this.type = type; 
                this.x = canvas.width + 100;
                this.y = GROUND_Y - 50 - Math.random() * 150;
                this.angle = 0;
                
                if (type === 'star') { this.size = 25; this.color = '#ffd700'; }
                else if (type === 'coin') { this.size = 18; this.color = '#00ff66'; }
                else if (type === 'magnet') { this.size = 22; this.color = '#ff00ff'; }
                else if (type === 'shield') { this.size = 22; this.color = '#00ffff'; }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.strokeStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                if (this.type === 'star') {
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size/2, Math.sin((18 + i * 72) * Math.PI / 180) * this.size/2);
                        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * this.size/4, Math.sin((54 + i * 72) * Math.PI / 180) * this.size/4);
                    }
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'coin') {
                    ctx.moveTo(0, -this.size); ctx.lineTo(this.size, 0); ctx.lineTo(0, this.size); ctx.lineTo(-this.size, 0);
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'magnet') {
                    ctx.arc(0, 0, this.size/2, 0, Math.PI);
                    ctx.lineTo(-this.size/2, -this.size/2);
                    ctx.lineTo(-this.size/4, -this.size/2);
                    ctx.lineTo(-this.size/4, 0);
                    ctx.arc(0, 0, this.size/4, Math.PI, 0, true);
                    ctx.lineTo(this.size/4, -this.size/2);
                    ctx.lineTo(this.size/2, -this.size/2);
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'shield') {
                    for (let i = 0; i < 6; i++) {
                        ctx.lineTo(Math.cos(i * Math.PI / 3) * this.size/1.5, Math.sin(i * Math.PI / 3) * this.size/1.5);
                    }
                    ctx.closePath(); ctx.stroke();
                }
                ctx.restore();
            }
            update() {
                this.x -= gameSpeed;
                if (this.type !== 'shield') this.angle += 0.05; 
            }
        }

        class Particle {
            constructor(x, y, color, speedMult = 1) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 1;
                this.vx = (Math.random() - 0.5) * 8 * speedMult;
                this.vy = (Math.random() - 0.5) * 8 * speedMult;
                this.color = color;
                this.alpha = 1;
                this.gravity = 0.1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
            update() { 
                this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.alpha -= 0.02; 
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color; this.alpha = 1; this.vy = -1.5;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.font = 'bold 20px Pretendard';
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
            update() { this.y += this.vy; this.alpha -= 0.02; }
        }

        let player;
        let obstacles = [];
        let items = [];
        let particles = [];
        let floatingTexts = [];
        let backgrounds = [];
        let frame = 0;

        function createDust(x, y, color) {
            for(let i=0; i<8; i++) particles.push(new Particle(x, y, color, 0.5));
        }

        function triggerSpeedUp() {
            gameSpeed += speedIncrement;
            updateBackgroundColor(); 
            speedAlertUI.style.display = 'block';
            speedAlertUI.classList.remove('animate-speed');
            void speedAlertUI.offsetWidth; 
            speedAlertUI.classList.add('animate-speed');
            setTimeout(() => { speedAlertUI.style.display = 'none'; }, 1200);
        }

        function showJumpAlert(text) {
            const jumpAlert = document.getElementById('jump-alert');
            jumpAlert.innerText = text; jumpAlert.style.display = 'block';
            jumpAlert.classList.remove('animate-speed'); void jumpAlert.offsetWidth; jumpAlert.classList.add('animate-speed');
            setTimeout(() => { jumpAlert.style.display = 'none'; }, 2000);
        }

        function startGame() {
            // 카메라(컨테이너) 높이 초기화
            currentContainerHeight = 400;
            targetContainerHeight = 400;
            gameContainer.style.height = '400px';
            canvas.height = 400;
            GROUND_Y = 350;

            player = new Player();
            obstacles = [];
            items = [];
            particles = [];
            floatingTexts = [];
            backgrounds = [];
            for(let i=0; i<10; i++) { let bg = new BackgroundBuilding(); bg.x = Math.random() * canvas.width; backgrounds.push(bg); }

            score = 0;
            gameSpeed = initialSpeed;
            frame = 0;
            nextMilestoneIndex = 0;
            unlocked3Jump = false;
            unlocked4Jump = false;
            isResting = false;
            restTimer = 0;
            nextRestScore = 1500;
            gameActive = true;
            shakeTime = 0;
            
            updateBackgroundColor(); 
            
            overlay.style.display = 'none';
            invincibleUI.style.display = 'none';
            magnetUI.style.display = 'none';
            shieldUI.style.display = 'none';
            speedAlertUI.style.display = 'none';
            document.getElementById('jump-alert').style.display = 'none';
            document.getElementById('rest-alert').style.display = 'none';
            restSubtitle.style.display = 'none';
            animate();
        }

        function gameOver() {
            gameActive = false;
            shakeTime = 25; 
            for(let i=0; i<40; i++) particles.push(new Particle(player.x + 20, player.y + 20, playerColor, 2.5));

            setTimeout(() => {
                cancelAnimationFrame(animationId);
                if (score > highScore) highScore = score;
                highScoreLabel.innerText = `BEST: ${highScore}`;
                overlay.style.display = 'flex';
                document.getElementById('title').innerText = "GAME OVER";
                document.querySelector('.btn-start').innerText = "RESTART (Space)";
            }, 600); 
        }

        function handleInput(e) {
            // 스페이스바를 눌렀을 때 화면이 아래로 스크롤되는 현상 방지
            if (e.code === 'Space') {
                e.preventDefault();
            }

            if (e.code === 'Space' || e.type === 'mousedown' || e.type === 'touchstart') {
                if (gameActive) {
                    player.jump();
                } else if (e.code === 'Space' && overlay.style.display !== 'none') {
                    // 게임 오버 상태이거나 시작 화면일 때 스페이스바로 즉시 시작
                    startGame();
                }
            }
        }

        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });

        function animate() {
            if (!gameActive && particles.length === 0) return;
            animationId = requestAnimationFrame(animate);
            
            // ============ 화면 높이(시야 확장) 부드러운 전환 처리 ============
            if (Math.abs(currentContainerHeight - targetContainerHeight) > 0.5) {
                let diff = targetContainerHeight - currentContainerHeight;
                let step = diff * 0.05;
                if (Math.abs(step) < 0.5) step = Math.sign(diff) * 0.5;

                currentContainerHeight += step;
                gameContainer.style.height = currentContainerHeight + 'px';
                canvas.height = currentContainerHeight; // 캔버스 실제 크기 업데이트

                // 땅의 Y좌표 업데이트 & 기존 객체들 높이 동기화
                let oldGroundY = GROUND_Y;
                GROUND_Y = currentContainerHeight - 50;
                let deltaY = GROUND_Y - oldGroundY;

                player.y += deltaY;
                obstacles.forEach(o => {
                    o.y += deltaY;
                    if (o.baseY !== undefined) o.baseY += deltaY;
                    if (o.gapY !== undefined) o.gapY += deltaY;
                });
                items.forEach(i => i.y += deltaY);
                particles.forEach(p => p.y += deltaY);
                backgrounds.forEach(b => b.y += deltaY);
                floatingTexts.forEach(f => f.y += deltaY);
            }
            // =========================================================

            ctx.save();
            
            if (shakeTime > 0) {
                const dx = (Math.random() - 0.5) * 12;
                const dy = (Math.random() - 0.5) * 12;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive && frame % 30 === 0) backgrounds.push(new BackgroundBuilding());
            backgrounds.forEach((bg, index) => {
                if(gameActive) bg.update();
                bg.draw();
                if(bg.x + bg.width < 0) backgrounds.splice(index, 1);
            });

            if (gameActive) {
                frame++;
                if (frame % 5 === 0) {
                    score++;
                    scoreLabel.innerText = `SCORE: ${score}`;
                    
                    if (nextMilestoneIndex < speedUpMilestones.length && score >= speedUpMilestones[nextMilestoneIndex]) {
                        triggerSpeedUp();
                        nextMilestoneIndex++;
                    }
                    
                    // 3단, 4단 점프 해제 시 화면 시야 확장 (컨테이너 높이 변경)
                    if (score >= 3000 && !unlocked3Jump) { 
                        unlocked3Jump = true; 
                        player.maxJumps = 3; 
                        targetContainerHeight = 500; // 시야 확장
                        showJumpAlert("3단 점프 해제! ✨"); 
                    }
                    if (score >= 5000 && !unlocked4Jump) { 
                        unlocked4Jump = true; 
                        player.maxJumps = 4; 
                        targetContainerHeight = 600; // 시야 2단계 확장
                        showJumpAlert("4단 점프 해제! ✨✨"); 
                    }
                    
                    // 휴식 구간 진입
                    if (score >= nextRestScore && !isResting) {
                        isResting = true;
                        restTimer = 400;
                        nextRestScore += 2000;
                        
                        const restAlert = document.getElementById('rest-alert');
                        restAlert.style.display = 'block';
                        restAlert.classList.remove('animate-speed');
                        void restAlert.offsetWidth;
                        restAlert.classList.add('animate-speed');
                        setTimeout(() => { restAlert.style.display = 'none'; }, 2000);
                    }
                }
            }

            player.update();
            player.draw();

            if (gameActive) {
                if (!isResting && frame % 150 === 0 && Math.random() > 0.4) {
                    const r = Math.random();
                    let itemType = 'coin';
                    if (r < 0.1) itemType = 'star';
                    else if (r < 0.2) itemType = 'magnet';
                    else if (r < 0.3) itemType = 'shield';
                    items.push(new Item(itemType));
                }

                if (isResting) {
                    restTimer--;
                    
                    // 휴식 구간 자막 노출
                    restSubtitle.style.display = 'block';
                    if (restTimer > 300) {
                        restSubtitle.innerText = "☕ 숨을 고르세요... ☕";
                        restSubtitle.style.color = '#fff';
                        restSubtitle.style.textShadow = '0 0 15px #00f2fe';
                    } else if (restTimer > 200) {
                        restSubtitle.innerText = "💎 쏟아지는 코인을 모으세요! 💎";
                        restSubtitle.style.color = '#00ff66';
                        restSubtitle.style.textShadow = '0 0 15px #00ff66';
                    } else if (restTimer > 100) {
                        restSubtitle.innerText = "🧘‍♂️ 손가락 스트레칭 꾹꾹 🧘‍♂️";
                        restSubtitle.style.color = '#ff9d00';
                        restSubtitle.style.textShadow = '0 0 15px #ff9d00';
                    } else {
                        restSubtitle.innerText = "⚡ 곧 다음 스테이지 시작! ⚡";
                        restSubtitle.style.color = '#ff0055';
                        restSubtitle.style.textShadow = '0 0 15px #ff0055';
                    }

                    if (restTimer <= 0) {
                        isResting = false;
                        restSubtitle.style.display = 'none';
                    }

                    if (frame % 10 === 0) {
                        let coin = new Item('coin');
                        coin.y = GROUND_Y - 120 + Math.sin(frame * 0.1) * 60;
                        items.push(coin);
                    }
                } else {
                    restSubtitle.style.display = 'none'; // 휴식 아닐 땐 숨김
                    
                    const spawnRate = Math.max(25, Math.floor(70 - gameSpeed * 1.5));
                    if (frame % spawnRate === 0 && Math.random() > 0.4) {
                        let availableTypes = [0]; 
                        if (score >= 100) availableTypes.push(1); 
                        if (score >= 500) availableTypes.push(2); 
                        if (score >= 1000) availableTypes.push(3); 
                        if (score >= 2000) availableTypes.push(4); 
                        if (score >= 3000) availableTypes.push(5); 
                        if (score >= 4000) availableTypes.push(6); 
                        if (score >= 5000) availableTypes.push(7); 
                        if (score >= 6000) availableTypes.push(8); 
                        if (score >= 7000) availableTypes.push(9); 
                        if (score >= 8000) availableTypes.push(10); 
                        if (score >= 9000) availableTypes.push(11); 
                        if (score >= 10000) availableTypes.push(12); 
                        
                        const selectedType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                        obstacles.push(new Obstacle(selectedType));
                    }
                }
            }

            if (player.isMagnetic) {
                items.forEach(item => {
                    if (item.type === 'coin') {
                        let dx = (player.x + player.width/2) - item.x;
                        let dy = (player.y + player.height/2) - item.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist < 250) { 
                            item.x += dx * 0.1;
                            item.y += dy * 0.1;
                        }
                    }
                });
            }

            obstacles.forEach((obs, index) => {
                obs.update();
                obs.draw();
                if (gameActive && obs.checkCollision(player)) {
                    if (player.isInvincible || player.shieldInvincible > 0) {
                        shakeTime = 8; 
                        for(let i=0; i<12; i++) particles.push(new Particle(obs.x + obs.width/2, obs.y + (obs.height||50)/2, obs.color, 1.2));
                        obstacles.splice(index, 1);
                    } else if (player.hasShield) {
                        player.hasShield = false;
                        shieldUI.style.display = 'none';
                        player.shieldInvincible = 30; 
                        shakeTime = 15;
                        for(let i=0; i<20; i++) particles.push(new Particle(obs.x + obs.width/2, obs.y + (obs.height||50)/2, '#00ffff', 2)); 
                        obstacles.splice(index, 1);
                    } else {
                        gameOver();
                    }
                }
                if (obs.x + obs.width < -100) obstacles.splice(index, 1);
            });

            items.forEach((item, index) => {
                item.update();
                item.draw();
                const dist = Math.hypot(player.x + player.width/2 - item.x, player.y + player.height/2 - item.y);
                if (gameActive && dist < 35) {
                    if (item.type === 'star') {
                        player.makeInvincible(300); 
                    } else if (item.type === 'magnet') {
                        player.makeMagnetic(400); 
                    } else if (item.type === 'shield') {
                        player.equipShield(); 
                    } else if (item.type === 'coin') {
                        score += 50;
                        scoreLabel.innerText = `SCORE: ${score}`;
                        floatingTexts.push(new FloatingText(item.x, item.y, "+50", item.color));
                    }
                    
                    items.splice(index, 1);
                    for(let i=0; i<15; i++) particles.push(new Particle(item.x, item.y, item.color, 1.2));
                }
                if (item.x + item.size < -100) items.splice(index, 1);
            });

            particles.forEach((p, index) => {
                p.update(); p.draw();
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            floatingTexts.forEach((ft, index) => {
                ft.update(); ft.draw();
                if (ft.alpha <= 0) floatingTexts.splice(index, 1);
            });

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 20; i++) {
                let lineX = (i * 60 - (frame * gameSpeed) % 60);
                ctx.moveTo(lineX, GROUND_Y + 5);
                ctx.lineTo(lineX + 25, GROUND_Y + 5);
            }
            ctx.stroke();
            
            ctx.restore();
        }
    </script>
</body>
